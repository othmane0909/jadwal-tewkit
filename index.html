<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ── ترويسات الأمان (احتياطية إن لم يدعمها الخادم) ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline';
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: blob:;
                   connect-src 'self' https://script.google.com https://script.googleusercontent.com;
                   frame-src 'self';
                   object-src 'none';
                   base-uri 'self';
                   form-action 'none';">

    <title>جداول توقيت الطلبة — جامعة البليدة 2</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/timetable.css?v=2">

    <!-- إزالة هوامش المتصفح الافتراضية -->
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: #0f3320; }
    </style>
</head>
<body>

<div class="ut-wrapper" dir="rtl" lang="ar">

    <!-- بطاقة البحث -->
    <div class="ut-card ut-filter-card">
        <h2 class="ut-filter-title">🔍 البحث عن جدول الفوج</h2>

        <!-- بحث سريع -->
        <div class="ut-quick-search-wrap">
            <input type="text" id="ut-quick-search"
                   class="ut-quick-search-input"
                   placeholder="🔎 بحث سريع — اكتب اسم التخصص أو الفوج أو القسم..."
                   autocomplete="off"
                   maxlength="100">
            <div id="ut-quick-results" class="ut-quick-results"></div>
        </div>

        <div class="ut-filter-divider">أو اختر يدوياً</div>

        <!-- السداسي (فلتر أساسي) -->
        <div class="ut-filter-field ut-sem-field">
            <label for="ut-sel-sem">📚 السداسي</label>
            <select id="ut-sel-sem" disabled>
                <option value="">— اختر السداسي —</option>
            </select>
        </div>

        <div class="ut-filter-grid">
            <div class="ut-filter-field">
                <label for="ut-sel-faculty">الكلية</label>
                <select id="ut-sel-faculty" disabled>
                    <option value="">— اختر الكلية —</option>
                </select>
            </div>
            <div class="ut-filter-field">
                <label for="ut-sel-dept">القسم</label>
                <select id="ut-sel-dept" disabled>
                    <option value="">— اختر القسم —</option>
                </select>
            </div>
            <div class="ut-filter-field">
                <label for="ut-sel-level">المستوى</label>
                <select id="ut-sel-level" disabled>
                    <option value="">— اختر المستوى —</option>
                </select>
            </div>
            <div class="ut-filter-field">
                <label for="ut-sel-spec">التخصص</label>
                <select id="ut-sel-spec" disabled>
                    <option value="">— اختر التخصص —</option>
                </select>
            </div>
            <div class="ut-filter-field">
                <label for="ut-sel-group">الفوج</label>
                <select id="ut-sel-group" disabled>
                    <option value="">— اختر الفوج —</option>
                </select>
            </div>
        </div>

        <button id="ut-btn-search" class="ut-btn-search">🔍 عرض الجدول</button>
    </div>

    <!-- شريط الحالة -->
    <div id="ut-status-bar" class="ut-status-bar"></div>

    <!-- الجدول -->
    <div id="ut-schedule-container"></div>

    <!-- أزرار الإجراءات -->
    <div id="ut-action-buttons" class="ut-action-buttons">
        <button id="ut-btn-print" class="ut-btn-action ut-btn-print">🖨️ طباعة</button>
        <button id="ut-btn-pdf"   class="ut-btn-action ut-btn-pdf">📥 تحميل PDF</button>
        <button id="ut-btn-share" class="ut-btn-action ut-btn-share">🔗 مشاركة الجدول</button>
    </div>
    <div id="ut-share-toast" class="ut-share-toast">✅ تم نسخ الرابط!</div>

</div>

<!-- مكتبات خارجية — يُنصح بتحميلها محلياً لمزيد من الأمان -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>

<!-- يجب أن يُحمَّل config.js قبل timetable.js -->
<script src="config.js?v=6"></script>
<script src="assets/js/timetable.js?v=6"></script>
</body>
</html>
